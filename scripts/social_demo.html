<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Omnivaleur — Social demo (vertical)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--mint:#34d399;--bg:#0b1224;--text:#fff;--muted:#93a3c2;
  --grad:linear-gradient(135deg,var(--blue),var(--mint));
}
html,body{width:608px;height:1080px;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;padding:40px;text-align:center;}
.bgfx{position:absolute;inset:0;background:
  radial-gradient(circle at 20% 15%, rgba(37,99,235,.35), transparent 55%),
  radial-gradient(circle at 85% 80%, rgba(52,211,153,.3), transparent 50%),
  var(--bg);
}

/* ---- Scene 1: Logo intro ---- */
#s1 .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;transform:scale(.6);opacity:0;}
.logo-mark{width:110px;height:110px;border-radius:28px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:52px;box-shadow:0 20px 60px rgba(37,99,235,.5);}
.logo-title{font-size:44px;font-weight:900;letter-spacing:-1px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:22px;font-weight:700;color:var(--muted);margin-top:6px;}

/* ---- Scene 2: Pain point ---- */
#s2 .big-line{font-size:40px;font-weight:900;color:#fff;line-height:1.25;}
#s2 .big-line .cross{color:#f87171;}
#s2 .plat-row{display:flex;gap:14px;margin-top:34px;}
.plat-chip{width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:30px;opacity:0;transform:translateY(30px) scale(.7);}

/* ---- Scene 3: stat pop-ins ---- */
#s3{align-items:stretch;}
.stat-grid{display:flex;flex-direction:column;gap:22px;width:100%;}
.stat-card{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:24px;padding:26px 30px;display:flex;align-items:center;gap:20px;opacity:0;transform:translateX(-60px) scale(.9);}
.stat-icon{font-size:36px;}
.stat-num{font-size:46px;font-weight:900;color:#fff;letter-spacing:-1px;}
.stat-lbl{font-size:17px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

/* ---- Scene 4: publish demo ---- */
#s4-card{width:100%;max-width:480px;background:#fff;border-radius:26px;box-shadow:0 30px 80px rgba(0,0,0,.5);overflow:hidden;transform:scale(.85);opacity:0;}
.s4-head{padding:20px 24px;font-weight:800;font-size:19px;color:#0f172a;border-bottom:1px solid #eef1f6;display:flex;align-items:center;gap:10px;}
.s4-body{padding:24px;}
.s4-photo{height:90px;border-radius:14px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0);display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:16px;}
.s4-field{border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 15px;font-size:17px;color:#0f172a;font-weight:700;margin-bottom:12px;min-height:22px;}
.s4-platforms{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.s4-chip{padding:8px 14px;border-radius:999px;border:1.5px solid #e2e8f0;font-size:14px;font-weight:700;color:#94a3b8;transition:all .2s;}
.s4-chip.on{background:#dcfce7;border-color:#6ee7b7;color:#059669;}
.s4-btn{width:100%;padding:16px;border-radius:999px;border:none;font-size:18px;font-weight:800;color:#fff;background:var(--grad);}
.s4-flash{position:absolute;inset:0;background:#fff;opacity:0;}

/* ---- Scene 5: success burst ---- */
#s5 .check-circle{width:150px;height:150px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:76px;color:#fff;transform:scale(0);box-shadow:0 20px 70px rgba(52,211,153,.5);}
#s5 .s5-title{font-size:36px;font-weight:900;color:#fff;margin-top:26px;opacity:0;}
#s5 .s5-sub{font-size:19px;color:var(--muted);margin-top:10px;font-weight:600;opacity:0;}
.particle{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--mint);opacity:0;}

/* ---- Scene 6: CTA ---- */
#s6 .cta-title{font-size:42px;font-weight:900;color:#fff;line-height:1.2;opacity:0;transform:translateY(20px);}
#s6 .cta-sub{font-size:22px;font-weight:700;margin-top:16px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;}
#s6 .cta-btn{margin-top:38px;padding:18px 40px;border-radius:999px;background:var(--grad);color:#fff;font-size:20px;font-weight:800;opacity:0;transform:scale(.7);box-shadow:0 20px 50px rgba(37,99,235,.5);}

@keyframes popIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shrinkOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.92)}}
</style>
</head>
<body>
<div class="bgfx"></div>

<div class="scene" id="s1">
  <div class="logo-wrap" id="s1-wrap">
    <div class="logo-mark">🔁</div>
    <div class="logo-title">Omnivaleur</div>
    <div class="logo-sub">List once. Sell everywhere.</div>
  </div>
</div>

<div class="scene" id="s2">
  <div class="big-line">Tired of listing<br>the same item <span class="cross">5x</span>?</div>
  <div class="plat-row">
    <div class="plat-chip">🇳🇱</div>
    <div class="plat-chip">🇧🇪</div>
    <div class="plat-chip">👕</div>
    <div class="plat-chip">🛒</div>
    <div class="plat-chip">🛍️</div>
  </div>
</div>

<div class="scene" id="s3">
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-icon">📦</div><div><div class="stat-num" id="n1">0</div><div class="stat-lbl">items listed</div></div></div>
    <div class="stat-card"><div class="stat-icon">🌍</div><div><div class="stat-num" id="n2">0</div><div class="stat-lbl">live listings</div></div></div>
    <div class="stat-card"><div class="stat-icon">⚡</div><div><div class="stat-num" id="n3">0u</div><div class="stat-lbl">saved / week</div></div></div>
  </div>
</div>

<div class="scene" id="s4">
  <div id="s4-card">
    <div class="s4-head">🧥 New item</div>
    <div class="s4-body">
      <div class="s4-photo">📸</div>
      <div class="s4-field" id="s4-title">&nbsp;</div>
      <div class="s4-field" id="s4-desc" style="min-height:44px">&nbsp;</div>
      <div class="s4-platforms" id="s4-plats">
        <div class="s4-chip">Marktplaats</div>
        <div class="s4-chip">2dehands</div>
        <div class="s4-chip">Vinted</div>
        <div class="s4-chip">eBay</div>
      </div>
      <button class="s4-btn" id="s4-btn">Publish item</button>
    </div>
    <div class="s4-flash" id="s4-flash"></div>
  </div>
</div>

<div class="scene" id="s5">
  <div class="check-circle" id="check-circle">✓</div>
  <div class="s5-title" id="s5-title">Live on 4 platforms</div>
  <div class="s5-sub" id="s5-sub">in under 15 seconds</div>
</div>

<div class="scene" id="s6">
  <div class="cta-title" id="cta-title">Automate your<br>resale business</div>
  <div class="cta-sub" id="cta-sub">crosslisteu.com</div>
  <div class="cta-btn" id="cta-btn">Try it free →</div>
</div>

<script>
function show(id){document.getElementById(id).style.opacity='1';}
function hide(id){document.getElementById(id).style.opacity='0';}
function el(id){return document.getElementById(id);}

function countUp(id, target, suffix, dur){
  const node = el(id); const start = performance.now();
  function frame(now){
    const p = Math.min(1,(now-start)/dur);
    const eased = 1-Math.pow(1-p,3);
    node.textContent = Math.round(target*eased) + (suffix||'');
    if(p<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function typeInto(el_, text, speed, cb){
  let i=0;
  (function step(){
    el_.textContent = text.slice(0,i);
    i++;
    if(i<=text.length) setTimeout(step, speed);
    else if(cb) cb();
  })();
}

function spawnParticles(container, count){
  const rect = container.getBoundingClientRect();
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className='particle';
    const angle = (Math.PI*2*i)/count;
    const dist = 140 + Math.random()*90;
    p.style.left = (rect.left+rect.width/2) + 'px';
    p.style.top = (rect.top+rect.height/2) + 'px';
    p.style.background = i%2===0 ? '#34d399' : '#2563eb';
    document.body.appendChild(p);
    p.animate([
      {transform:'translate(0,0) scale(1)', opacity:1},
      {transform:`translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity:0}
    ], {duration:700+Math.random()*300, easing:'cubic-bezier(.2,.8,.2,1)'});
    setTimeout(()=>p.remove(), 1100);
  }
}

// ===== Timeline (fast-paced, ~15.5s total) =====
const T = {
  s1_in: 80,      s1_hold: 1300,  s1_out: 1500,
  s2_in: 1650,    s2_chips: 1900, s2_out: 3200,
  s3_in: 3350,    s3_out: 6600,
  s4_in: 6750,    s4_flash: 6900,
  s4_photo: 7300, s4_title: 7700, s4_desc: 8900, s4_plats: 10100,
  s4_publish: 10900, s4_out: 11700,
  s5_in: 11800,   s5_burst: 11950, s5_text: 12300, s5_out: 13700,
  s6_in: 13850,   s6_title:14000, s6_sub:14350, s6_btn:14650
};

// Scene 1
setTimeout(()=>{ show('s1'); el('s1-wrap').style.animation='popIn .6s cubic-bezier(.2,.8,.2,1) forwards'; }, T.s1_in);
setTimeout(()=>{ el('s1').style.animation='shrinkOut .35s ease forwards'; }, T.s1_out);

// Scene 2
setTimeout(()=>{ show('s2'); el('s2').querySelector('.big-line').style.animation='slideUp .5s ease forwards'; }, T.s2_in);
setTimeout(()=>{
  document.querySelectorAll('.plat-chip').forEach((c,i)=>{
    setTimeout(()=>{ c.style.transition='all .4s cubic-bezier(.2,.8,.2,1)'; c.style.opacity='1'; c.style.transform='translateY(0) scale(1)'; }, i*90);
  });
}, T.s2_chips);
setTimeout(()=>{ el('s2').style.animation='shrinkOut .3s ease forwards'; }, T.s2_out);

// Scene 3
setTimeout(()=>{
  show('s3');
  document.querySelectorAll('#s3 .stat-card').forEach((c,i)=>{
    setTimeout(()=>{ c.style.transition='all .45s cubic-bezier(.2,.8,.2,1)'; c.style.opacity='1'; c.style.transform='translateX(0) scale(1)'; }, i*160);
  });
  setTimeout(()=>countUp('n1',47,'',900), 150);
  setTimeout(()=>countUp('n2',129,'',900), 310);
  setTimeout(()=>countUp('n3','',900), 470);
  setTimeout(()=>{ el('n3').textContent='0u'; countUpDecimal('n3',6.5,'u',900); }, 470);
}, T.s3_in);
function countUpDecimal(id, target, suffix, dur){
  const node = el(id); const start = performance.now();
  function frame(now){
    const p = Math.min(1,(now-start)/dur);
    const eased = 1-Math.pow(1-p,3);
    node.textContent = (target*eased).toFixed(1) + suffix;
    if(p<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
setTimeout(()=>{ el('s3').style.animation='shrinkOut .3s ease forwards'; }, T.s3_out);

// Scene 4
setTimeout(()=>{ show('s4'); el('s4-card').style.transition='all .5s cubic-bezier(.2,.8,.2,1)'; el('s4-card').style.opacity='1'; el('s4-card').style.transform='scale(1)'; }, T.s4_in);
setTimeout(()=>{ el('s4-photo') && (el('s4').querySelector('.s4-photo').textContent='🧥'); }, T.s4_photo);
setTimeout(()=>{ typeInto(el('s4-title'), 'Nike Tech Fleece Jacket', 22); }, T.s4_title);
setTimeout(()=>{ typeInto(el('s4-desc'), 'AI: Like new, size M, warm fleece...', 13); }, T.s4_desc);
setTimeout(()=>{
  document.querySelectorAll('#s4-plats .s4-chip').forEach((c,i)=>{
    setTimeout(()=>c.classList.add('on'), i*130);
  });
}, T.s4_plats);
setTimeout(()=>{
  el('s4-btn').textContent='Publishing…';
  el('s4-flash').animate([{opacity:0},{opacity:.85},{opacity:0}], {duration:400});
}, T.s4_publish);
setTimeout(()=>{ el('s4').style.animation='shrinkOut .3s ease forwards'; }, T.s4_out);

// Scene 5
setTimeout(()=>{ show('s5'); el('check-circle').style.transition='transform .5s cubic-bezier(.34,1.56,.64,1)'; el('check-circle').style.transform='scale(1)'; }, T.s5_in);
setTimeout(()=>{ spawnParticles(el('check-circle'), 14); }, T.s5_burst);
setTimeout(()=>{
  el('s5-title').style.transition='opacity .4s ease'; el('s5-title').style.opacity='1';
  el('s5-sub').style.transition='opacity .4s ease .1s'; el('s5-sub').style.opacity='1';
}, T.s5_text);
setTimeout(()=>{ el('s5').style.animation='shrinkOut .3s ease forwards'; }, T.s5_out);

// Scene 6
setTimeout(()=>{ show('s6'); }, T.s6_in);
setTimeout(()=>{ el('cta-title').style.transition='all .5s cubic-bezier(.2,.8,.2,1)'; el('cta-title').style.opacity='1'; el('cta-title').style.transform='translateY(0)'; }, T.s6_title);
setTimeout(()=>{ el('cta-sub').style.transition='opacity .4s ease'; el('cta-sub').style.opacity='1'; }, T.s6_sub);
setTimeout(()=>{ el('cta-btn').style.transition='all .4s cubic-bezier(.34,1.56,.64,1)'; el('cta-btn').style.opacity='1'; el('cta-btn').style.transform='scale(1)'; }, T.s6_btn);
</script>
</body>
</html>
