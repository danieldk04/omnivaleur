<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 300px; background: #f8fafc; }

    .header {
      background: linear-gradient(135deg, #2563eb, #34d399);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo { font-size: 20px; }
    .header-title { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .header-sub { color: rgba(255,255,255,.75); font-size: 11px; margin-top: 1px; }

    .body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

    /* Status badge */
    .status-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 10px;
      font-size: 12px; font-weight: 600;
    }
    .status-badge.connected { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .status-badge.disconnected { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.green { background: #16a34a; }
    .status-dot.red { background: #dc2626; }

    .user-email { font-size: 11px; color: #64748b; margin-top: 2px; font-weight: 400; }

    /* Form */
    label { display: block; font-size: 11px; font-weight: 600; color: #374151; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
    input {
      width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; color: #0f172a; background: #fff; outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #2563eb; }

    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #34d399); color: #fff; }
    .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; }
    .btn-danger { background: #fef2f2; color: #dc2626; border: 1.5px solid #fecaca; }

    .error-msg { font-size: 12px; color: #dc2626; min-height: 16px; }
    .success-msg { font-size: 12px; color: #16a34a; min-height: 16px; }

    .divider { border: none; border-top: 1px solid #e2e8f0; }

    .section-title { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }

    .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #64748b; }
    .info-row strong { color: #0f172a; }

    .warning-box {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
      padding: 10px 12px; font-size: 12px; color: #92400e; line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo">🔀</div>
    <div>
      <div class="header-title">ListHub</div>
      <div class="header-sub">Automatic cross-listing extension</div>
    </div>
  </div>

  <div class="body">

    <!-- LOGGED OUT STATE -->
    <div id="loggedOut" style="display:none;flex-direction:column;gap:12px">
      <div class="status-badge disconnected">
        <div class="status-dot red"></div>
        <span>Not logged in — extension inactive</span>
      </div>
      <div class="warning-box">
        ⚠️ Log in to activate the extension. Without login, jobs won't be picked up and nothing will be published.
      </div>
      <div>
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div>
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="loginBtn">Log in</button>
      <div class="error-msg" id="authStatus"></div>
    </div>

    <!-- LOGGED IN STATE -->
    <div id="loggedIn" style="display:none;flex-direction:column;gap:12px">
      <div class="status-badge connected">
        <div class="status-dot green"></div>
        <div>
          <div>Extension active — ready to publish</div>
          <div class="user-email" id="userInfo"></div>
        </div>
      </div>

      <div class="info-row">
        <span>Server</span>
        <strong>crosslisteu.com</strong>
      </div>
      <div class="info-row">
        <span>Polls every</span>
        <strong>15 seconds</strong>
      </div>

      <hr class="divider">

      <button class="btn btn-danger" id="logoutBtn">Log out</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
