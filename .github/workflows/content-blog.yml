name: Programmatic content generation

on:
  schedule:
    - cron: '0 8 * * *'  # 09:00/10:00 CET dagelijks
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Alleen research + generatie loggen, niets publiceren'
        type: boolean
        default: false
      all:
        description: 'Alle pending keywords verwerken i.p.v. er 1'
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements-content.txt

      - name: Run content pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: python3 scripts/generate_content.py ${{ github.event.inputs.all == 'true' && '--all' || '' }}

      - name: Commit updated keyword queue
        run: |
          git config user.name "content-bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add scripts/content_keywords.json
          git diff --staged --quiet && exit 0
          git commit -m "auto: update content keyword queue"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && exit 0
            echo "Push attempt $i failed (concurrent push to main) — retrying after rebase..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "::error::Could not push keyword queue update after 5 attempts"
          exit 1
