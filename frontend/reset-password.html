<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Set new password — Omnivaleur</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #2563eb; --mint: #34d399; --bg: #f0f9ff;
  --surface: #fff; --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
  --red: #dc2626; --red-bg: #fef2f2; --green: #16a34a; --green-bg: #f0fdf4;
  --radius: 10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.logo img { height: 38px; }
.logo span { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--blue), var(--mint)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(37,99,235,.08); }
h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -.3px; }
.subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; transition: border-color .15s; background: var(--bg); }
input:focus { border-color: var(--blue); background: #fff; }
.field { margin-bottom: 18px; }
.btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--blue), var(--mint)); color: #fff; border: none; border-radius: 100px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: all .2s; box-shadow: 0 2px 12px rgba(37,99,235,.25); }
.btn:hover { box-shadow: 0 4px 20px rgba(37,99,235,.4); transform: translateY(-1px); }
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.error { background: var(--red-bg); color: var(--red); font-size: 13px; padding: 10px 14px; border-radius: var(--radius); margin-bottom: 18px; display: none; border: 1px solid #fecaca; }
.success { background: var(--green-bg); color: var(--green); font-size: 14px; padding: 16px 14px; border-radius: var(--radius); margin-bottom: 18px; display: none; border: 1px solid #bbf7d0; text-align: center; line-height: 1.5; }
.links { margin-top: 22px; text-align: center; font-size: 13px; }
.links a { color: var(--blue); font-weight: 600; }
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FERDR093F7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-FERDR093F7');
</script>
</head>
<body>

<div class="logo">
  <img src="logo.png" alt="">
  <span>Omnivaleur</span>
</div>

<div class="card">
  <h1>New password</h1>
  <p class="subtitle">Choose a new password for your account.</p>

  <div id="error" class="error"></div>
  <div id="success" class="success">✅ Password updated!<br>You can now log in with your new password.</div>

  <form id="form" onsubmit="doUpdate(event)">
    <div class="field">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autofocus autocomplete="new-password">
    </div>
    <div class="field">
      <label for="password2">Confirm password</label>
      <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button type="submit" class="btn" id="btn">Save password →</button>
  </form>

  <div class="links">
    <a href="/login">← Back to login</a>
  </div>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8001' : '';

function parseHash() {
  const hash = window.location.hash.slice(1);
  return Object.fromEntries(hash.split('&').map(p => p.split('=')));
}

const params = parseHash();
const accessToken = params.access_token;

if (!accessToken || params.type !== 'recovery') {
  document.getElementById('error').textContent = 'Invalid or expired reset link. Please request a new one.';
  document.getElementById('error').style.display = 'block';
  document.getElementById('form').style.display = 'none';
}

async function doUpdate(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const btn = document.getElementById('btn');
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';

  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    errEl.style.display = 'block';
    return;
  }
  if (password !== password2) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const res = await fetch(`${API}/api/auth/reset-password`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${accessToken}`
      },
      body: JSON.stringify({ password })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || 'Something went wrong. Please try again.');
    document.getElementById('form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
    setTimeout(() => { window.location.href = '/login.html'; }, 3000);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Save password →';
  }
}
</script>

</body>
</html>
