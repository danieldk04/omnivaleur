<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connecting Shopify — ListHub</title>
<link rel="icon" type="image/png" href="Logo Crosslist EU.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #2563eb; --mint: #34d399; --bg: #f0f9ff;
  --surface: #fff; --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
  --red: #dc2626; --red-bg: #fef2f2; --green: #16a34a; --green-bg: #f0fdf4;
  --radius: 10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.logo img { height: 38px; }
.logo span { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--blue), var(--mint)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(37,99,235,.08); text-align: center; }
h1 { font-size: 18px; font-weight: 800; margin-bottom: 8px; letter-spacing: -.3px; }
p { font-size: 14px; color: var(--muted); line-height: 1.5; }
.spinner { width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 18px; }
@keyframes spin { to { transform: rotate(360deg); } }
.icon { font-size: 34px; margin-bottom: 12px; }
.btn { display: inline-block; margin-top: 20px; padding: 11px 22px; background: linear-gradient(135deg, var(--blue), var(--mint)); color: #fff; border: none; border-radius: 100px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; }
</style>
</head>
<body>

<div class="logo">
  <img src="Logo Crosslist EU.png" alt="">
  <span>ListHub</span>
</div>

<div class="card" id="card">
  <div class="spinner"></div>
  <h1>Connecting your Shopify store…</h1>
  <p>Hold on, this only takes a second.</p>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8001' : '';
const TOKEN = sessionStorage.getItem('cl_token') || '';

function render(icon, title, sub, showBtn) {
  document.getElementById('card').innerHTML = `
    <div class="icon">${icon}</div>
    <h1>${title}</h1>
    <p>${sub}</p>
    ${showBtn ? '<a href="/app.html#platforms" class="btn">Back to dashboard →</a>' : ''}
  `;
}

(async function () {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const shop = params.get('shop');
  const error = params.get('error') || params.get('error_description');

  if (!TOKEN) {
    render('🔒', 'Please log in first', 'Your session expired — log in to ListHub, then try connecting Shopify again.', true);
    return;
  }
  if (error) {
    render('⚠️', 'Shopify authorization was cancelled', error, true);
    return;
  }
  if (!code || !shop) {
    render('⚠️', 'Something went wrong', 'No authorization code was received from Shopify. Please try again.', true);
    return;
  }

  try {
    const url = `${API}/api/platforms/shopify/callback?${params.toString()}`;
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      render('⚠️', 'Could not connect Shopify', err.detail || 'Please try again from the Platforms page.', true);
      return;
    }
    render('✅', 'Shopify connected!', 'You can now publish items directly to your Shopify store from ListHub.', false);
    setTimeout(() => { window.location.href = '/app.html#platforms'; }, 1800);
  } catch (e) {
    render('⚠️', 'Could not connect Shopify', String(e.message || e), true);
  }
})();
</script>
</body>
</html>
