<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account aanmaken — CrossList EU</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #2563eb; --mint: #34d399; --bg: #f0f9ff;
  --surface: #fff; --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
  --red: #dc2626; --red-bg: #fef2f2; --green: #16a34a; --green-bg: #f0fdf4;
  --radius: 10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.logo img { height: 38px; }
.logo span { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--blue), var(--mint)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(37,99,235,.08); }
h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -.3px; }
.subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; transition: border-color .15s; background: var(--bg); }
input:focus { border-color: var(--blue); background: #fff; }
.field { margin-bottom: 18px; }
.btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--blue), var(--mint)); color: #fff; border: none; border-radius: 100px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: all .2s; box-shadow: 0 2px 12px rgba(37,99,235,.25); }
.btn:hover { box-shadow: 0 4px 20px rgba(37,99,235,.4); transform: translateY(-1px); }
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.error { background: var(--red-bg); color: var(--red); font-size: 13px; padding: 10px 14px; border-radius: var(--radius); margin-bottom: 18px; display: none; border: 1px solid #fecaca; }
.success { background: var(--green-bg); color: var(--green); font-size: 14px; padding: 16px 14px; border-radius: var(--radius); margin-bottom: 18px; display: none; border: 1px solid #bbf7d0; text-align: center; line-height: 1.5; }
.links { margin-top: 22px; text-align: center; font-size: 13px; color: var(--muted); display: flex; flex-direction: column; gap: 8px; }
.links a { color: var(--blue); font-weight: 600; }
.perks { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.perk { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
.perk::before { content: '✓'; color: var(--mint); font-weight: 800; font-size: 14px; }
</style>
</head>
<body>

<div class="logo">
  <img src="Logo Crosslist EU.png" alt="">
  <span>CrossList EU</span>
</div>

<div class="card">
  <h1>Gratis starten</h1>
  <p class="subtitle">Maak je account aan</p>

  <div class="perks">
    <div class="perk">Publiceer op 6+ platforms tegelijk</div>
    <div class="perk">AI-beschrijvingen en marge calculator</div>
    <div class="perk">Geen creditcard nodig</div>
  </div>

  <div id="error" class="error"></div>
  <div id="success" class="success">✅ Account aangemaakt!<br>Check je e-mail om je account te bevestigen.</div>

  <form id="form" onsubmit="doRegister(event)">
    <div class="field">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" placeholder="naam@voorbeeld.nl" autofocus autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Wachtwoord</label>
      <input type="password" id="password" placeholder="Minimaal 8 tekens" autocomplete="new-password">
    </div>
    <div class="field">
      <label for="password2">Wachtwoord bevestigen</label>
      <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button type="submit" class="btn" id="btn">Account aanmaken →</button>
  </form>

  <div class="links">
    <span>Al een account? <a href="login.html">Inloggen</a></span>
    <a href="index.html">← Terug naar homepage</a>
  </div>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8001' : 'https://api.crosslisteu.com';

async function doRegister(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const btn = document.getElementById('btn');
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';

  if (password.length < 8) {
    errEl.textContent = 'Wachtwoord moet minimaal 8 tekens zijn.';
    errEl.style.display = 'block';
    return;
  }
  if (password !== password2) {
    errEl.textContent = 'Wachtwoorden komen niet overeen.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Account aanmaken...';

  try {
    const res = await fetch(`${API}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registratie mislukt');
    document.getElementById('form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Account aanmaken →';
  }
}
</script>

</body>
</html>
