<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in — CrossList EU</title>
<link rel="icon" type="image/png" href="Logo Crosslist EU.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #2563eb; --mint: #34d399; --bg: #f0f9ff;
  --surface: #fff; --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
  --red: #dc2626; --red-bg: #fef2f2; --radius: 10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.logo img { height: 38px; }
.logo span { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--blue), var(--mint)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(37,99,235,.08); }
h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -.3px; }
.subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; transition: border-color .15s; background: var(--bg); }
input:focus { border-color: var(--blue); background: #fff; }
.field { margin-bottom: 18px; }
.btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--blue), var(--mint)); color: #fff; border: none; border-radius: 100px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: all .2s; box-shadow: 0 2px 12px rgba(37,99,235,.25); }
.btn:hover { box-shadow: 0 4px 20px rgba(37,99,235,.4); transform: translateY(-1px); }
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.error { background: var(--red-bg); color: var(--red); font-size: 13px; padding: 10px 14px; border-radius: var(--radius); margin-bottom: 18px; display: none; border: 1px solid #fecaca; }
.links { margin-top: 22px; text-align: center; font-size: 13px; color: var(--muted); display: flex; flex-direction: column; gap: 8px; }
.links a { color: var(--blue); font-weight: 600; }
</style>
</head>
<body>

<div class="logo">
  <img src="Logo Crosslist EU.png" alt="">
  <span>CrossList EU</span>
</div>

<div class="card">
  <h1>Welcome back</h1>
  <p class="subtitle">Log in to your account</p>

  <div id="confirmed" style="background:#f0fdf4;color:#16a34a;font-size:13px;padding:12px 14px;border-radius:10px;margin-bottom:18px;display:none;border:1px solid #bbf7d0">✅ Email confirmed! You can now log in.</div>
  <div id="error" class="error"></div>

  <form onsubmit="doLogin(event)">
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="name@example.com" autofocus autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="btn">Log in →</button>
  </form>

  <div class="links">
    <span>No account yet? <a href="/register">Start free</a></span>
    <a href="/forgot-password">Forgot password?</a>
    <a href="/">← Back to homepage</a>
  </div>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8001' : 'https://api.crosslisteu.com';

if (new URLSearchParams(window.location.search).get('confirmed') === '1') {
  document.getElementById('confirmed').style.display = 'block';
}

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');
    sessionStorage.setItem('cl_auth', '1');
    sessionStorage.setItem('cl_token', data.access_token);
    sessionStorage.setItem('cl_email', data.user.email);
    // Sync token to Chrome extension if installed
    try {
      const extId = localStorage.getItem('cl_ext_id');
      if (extId && chrome?.runtime?.sendMessage) {
        chrome.runtime.sendMessage(extId, { type: 'SYNC_TOKEN', token: data.access_token, email: data.user.email });
      }
    } catch (_) {}
    window.location.href = '/app';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Log in →';
  }
}
</script>

</body>
</html>
